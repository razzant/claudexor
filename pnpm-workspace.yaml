packages:
  - "packages/*"
  - "benchmarks/runner"

# esbuild (multiple hoisted versions via knip/vitest) is our only dependency
# with build scripts; its JS API resolves the platform binary at runtime.
# pnpm 11 raises ERR_PNPM_IGNORED_BUILDS on a cold install unless dependency
# build scripts are allowed — the allowlist alone does not cover every hoisted
# duplicate version in CI. Our dependency set is controlled and audited.
onlyBuiltDependencies:
  - esbuild
dangerouslyAllowAllBuilds: true

# pnpm 11 runs an implicit deps-status check before every `pnpm run` that
# auto-installs; disable it and rely on explicit installs.
verifyDepsBeforeRun: false
