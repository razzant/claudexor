packages:
  - "packages/*"
  - "benchmarks/runner"

# esbuild is our only dependency with a build script and its JS API resolves the
# platform binary at runtime without a postinstall. Allow dependency build
# scripts so `pnpm install` exits 0 (otherwise pnpm 11 raises
# ERR_PNPM_IGNORED_BUILDS). Our dependency set is controlled.
onlyBuiltDependencies:
  - esbuild

# pnpm 11 runs an implicit deps-status check before every `pnpm run` that
# auto-installs; disable it and rely on explicit installs.
verifyDepsBeforeRun: false
