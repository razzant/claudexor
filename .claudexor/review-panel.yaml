# Per-commit review panel for THIS repository (D18). Versioned config chooses
# REVIEWERS only — it cannot grant powers (no env, no bypass, no exec knobs;
# CLAUDEXOR_BIBLE: versioned repo config never self-grants sensitive powers).
# Panel changes are reviewed like code.

# PRIMARY route: `claudexor review --reviewer-panel <this>` (engine reviewer
# machinery; subscription-first dogfood). Omit to let the engine resolve its
# default doctor-OK cross-family panel.
reviewer_panel: "codex,claude"

# FALLBACK route (OpenRouter triad-lite) when the primary route is
# unavailable AND OPENROUTER_API_KEY is present. Cheaper models are allowed
# per-commit; the release triad keeps its own locked panel.
fallback_models:
  - "openai/gpt-5.5"
  - "google/gemini-3.5-flash"

# Min reviewers with parseable findings for the fallback to count (fail closed).
quorum: 2

# Per-commit review budget; the release triad remains the deep gate.
# (Live-measured: a codex+claude cross-family review of a large staged diff
# runs 4-7 min on this machine depending on vendor load; 180s starved the
# primary route.)
budget_seconds: 600
