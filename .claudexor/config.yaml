# Claudexor project config (versioned). Safe settings only.
# Sensitive settings (full access, secrets, budget-above-cap, plugin install,
# MCP trust) live in ~/.claudexor/config.yaml or ~/.claudexor/trust/<hash>.yaml.
#
# mandatory_files (optional, empty on a fresh `claudexor init`) pins files as
# required run context — fail-closed if missing, enforced in every mode.
# THIS repo opts in: runs here must always read the README and the
# architecture map before acting.
version: 1
context:
  mandatory_files:
    - README.md
    - docs/ARCHITECTURE.md
  include: []
  exclude: []
tests:
  commands: []
budget:
  routing_goal: auto
