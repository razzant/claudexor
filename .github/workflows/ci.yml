name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.19.0, 24.16.0]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history: the concept gate range-walks the PR's constituent
          # commits (a shallow synthetic-merge checkout would hide them, and
          # the gate fails loudly on unreachable parents rather than skip).
          fetch-depth: 0

      # Secret scan runs FIRST — before any toolchain/lifecycle step can read
      # or echo repository contents. The patterns cannot self-match their own
      # literals (each embeds a `[` that breaks the class), so workflow files
      # are scanned too; verified empirically.
      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          if git grep -InE '(\bsk-[A-Za-z0-9_-]{20,}|\bsk-ant-[A-Za-z0-9_-]{20,}|\bsk-or-[A-Za-z0-9_-]{20,}|\bghp_[A-Za-z0-9_]{20,}|\bgithub_pat_[A-Za-z0-9_]{20,}|xox[baeprs]-[A-Za-z0-9-]{10,}|\bnpm_[A-Za-z0-9]{30,}|-----BEGIN [A-Z ]*PRIVATE KEY-----)' -- . ':!pnpm-lock.yaml'; then
            echo "::error::Potential token-like secret found in tracked files."
            exit 1
          fi

      # No `version:` here — pnpm/action-setup reads the `packageManager` field in package.json
      # (the Node-20-compatible pinned pnpm version). Specifying both causes
      # ERR_PNPM_BAD_PM_VERSION.
      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck (packages + tests + scripts)
        run: pnpm typecheck && pnpm typecheck:tests

      - name: Test
        run: pnpm test

      - name: Verify generated JSON Schema is up to date
        run: |
          pnpm schema:gen
          git diff --exit-code packages/schema/generated || (echo "::error::JSON Schema is stale; run 'pnpm schema:gen' and commit." && exit 1)
          if [ -n "$(git ls-files --others --exclude-standard packages/schema/generated)" ]; then
            echo "::error::Untracked generated schema files exist; commit them."
            exit 1
          fi

      - name: Validate generated JSON Schema dialect (ajv)
        run: node scripts/validate-generated-schemas.mjs

      - name: Docs truth (endpoints, mode ids, CLI flags)
        run: node scripts/docs-truth-check.mjs

      - name: Concept gate (Bible edits need CONCEPT-CHANGE markers)
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          # Checkout is fetch-depth: 0, so ranges walk real constituent
          # commits (synthetic PR merges are exempt unless they change the
          # Bible beyond their parents; the gate handles that itself).
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git check-ref-format --branch "$BASE_REF" >/dev/null
            git fetch --no-tags origin "$BASE_REF"
            node scripts/concept-gate.mjs --range "origin/$BASE_REF..HEAD"
          elif [[ "$BEFORE_SHA" =~ ^[0-9a-f]{40}$ ]] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            node scripts/concept-gate.mjs --range "$BEFORE_SHA..HEAD"
          else
            node scripts/concept-gate.mjs --since-last-tag
          fi

      - name: Staged-field gate (schema fields need producer+consumer)
        run: pnpm staged:check

      - name: Sensitive-resource ownership gate
        run: pnpm sensitive:check

      - name: Dead exports (knip)
        run: pnpm knip

      - name: Complexity ratchet (readability only goes up)
        run: node scripts/complexity-ratchet.mjs

      - name: Model-hints freshness (manifest known_models vs installed CLIs)
        run: node scripts/model-hints-freshness.mjs

      - name: MCP-CLI capability parity (tool args vs run-control flags)
        run: node scripts/mcp-cli-parity-check.mjs

      - name: Fixture provenance (manifest coverage; freshness warns locally)
        run: node scripts/fixture-freshness-check.mjs

      - name: Canary golden stories (fake-harness E2E)
        run: pnpm canary

      - name: Release workflow supply-chain contract
        run: pnpm release:workflow:check

      - name: Format
        run: pnpm format:check

      - name: Linux CLI smoke (bins, machine surfaces, doctor honesty)
        shell: bash
        run: |
          set -euo pipefail
          # The bare-package wrapper bins must run on Linux.
          node packages/claudexor/bin/claudexor.js --version
          node packages/claudexor/bin/claudexor.js help --json | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const j=JSON.parse(s);if(!j.ok||!Array.isArray(j.commands))process.exit(1);});'
          node packages/cli/dist/cli.js capabilities --json | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const j=JSON.parse(s);if(j.ok!==true)process.exit(1);});'
          # No vendor CLIs on the runner: doctor must report them honestly
          # (unavailable/degraded) as VALID JSON — a crash or empty output
          # fails this step loudly (no || true escape hatch).
          node packages/cli/dist/cli.js doctor --json > /tmp/doctor.json
          node -e 'const j=JSON.parse(require("node:fs").readFileSync("/tmp/doctor.json","utf8")); if(!Array.isArray(j.harnesses)) { console.error("doctor --json did not produce a harnesses array"); process.exit(1); }'

  swift:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Swift tests (ClaudexorKit)
        working-directory: apps/macos/ClaudexorKit
        run: swift test

      - name: Swift build (ClaudexorApp)
        working-directory: apps/macos/ClaudexorApp
        run: swift build
