name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # No `version:` here — pnpm/action-setup reads the `packageManager` field in package.json
      # (pnpm@11.5.2). Specifying both causes ERR_PNPM_BAD_PM_VERSION.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          if git grep -InE '(sk-[A-Za-z0-9_-]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,})' -- . ':!pnpm-lock.yaml'; then
            echo "::error::Potential token-like secret found in tracked files."
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify generated JSON Schema is up to date
        run: |
          pnpm schema:gen
          git diff --exit-code packages/schema/generated || (echo "::error::JSON Schema is stale; run 'pnpm schema:gen' and commit." && exit 1)
