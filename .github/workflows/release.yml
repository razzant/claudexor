name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Build a signed candidate or publish an existing reviewed tag
        required: true
        type: choice
        options: [candidate, publish]
      ref:
        description: Full 40-character SHA for candidate; stable vMAJOR.MINOR.PATCH tag for publish
        required: true
        type: string
      review_attestation_b64:
        description: Base64 signed schema-v3 owner-review attestation; required only for publish
        required: false
        type: string

permissions:
  contents: read

env:
  RELEASE_MODE_INPUT: ${{ inputs.mode }}
  RELEASE_REF_INPUT: ${{ inputs.ref }}
  REVIEW_ATTESTATION_B64_INPUT: ${{ inputs.review_attestation_b64 }}

concurrency:
  group: claudexor-release-v2
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.release.outputs.mode }}
      sha: ${{ steps.release.outputs.sha }}
      tree: ${{ steps.release.outputs.tree }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate input syntax before fetching it
        run: node scripts/verify-release-input.mjs --syntax-only

      - name: Fetch immutable release authority
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/*:refs/remotes/origin/*'
          if [ "$RELEASE_MODE_INPUT" = publish ]; then
            git fetch --no-tags origin "refs/tags/$RELEASE_REF_INPUT:refs/tags/$RELEASE_REF_INPUT"
          fi

      - name: Resolve exact SHA, tree, tag, and version
        id: release
        run: node scripts/verify-release-input.mjs

  package-macos:
    name: Build signed, notarized and attested macOS artifacts
    needs: prepare
    runs-on: macos-26
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Revalidate reviewed release authority
        env:
          REVIEW_ATTESTATION_PATH: ${{ runner.temp }}/review-attestation.json
        run: |
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          if [ "$RELEASE_MODE_INPUT" = publish ]; then
            git fetch --no-tags origin "refs/tags/$RELEASE_REF_INPUT:refs/tags/$RELEASE_REF_INPUT"
          fi
          node scripts/verify-release-input.mjs

      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          if git grep -InE '(\bsk-[A-Za-z0-9_-]{20,}|\bsk-ant-[A-Za-z0-9_-]{20,}|\bsk-or-[A-Za-z0-9_-]{20,}|\bghp_[A-Za-z0-9_]{20,}|\bgithub_pat_[A-Za-z0-9_]{20,}|xox[baeprs]-[A-Za-z0-9-]{10,}|\bnpm_[A-Za-z0-9]{30,}|-----BEGIN [A-Z ]*PRIVATE KEY-----)' -- . ':!pnpm-lock.yaml'; then
            echo "::error::Potential token-like secret found in tracked files."
            exit 1
          fi

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Require and import Apple release credentials
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          for name in BUILD_CERTIFICATE_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Signing and notarization secrets are required for every release artifact."
              exit 1
            fi
          done
          cert="$RUNNER_TEMP/build_certificate.p12"
          keychain="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$cert"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$cert" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain" >/dev/null
          security list-keychains -d user -s "$keychain" login.keychain
          identity="$(security find-identity -v -p codesigning "$keychain" | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          test -n "$identity" || { echo "::error::No Developer ID Application identity found."; exit 1; }
          xcrun notarytool store-credentials claudexor-notary \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" --keychain "$keychain" >/dev/null
          echo "SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "NOTARY_PROFILE=claudexor-notary" >> "$GITHUB_ENV"
          echo "NOTARY_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
          echo "CLAUDEXOR_NODE_BIN=$(node -p 'process.execPath')" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deterministic release gates
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          pnpm build
          pnpm typecheck
          pnpm typecheck:tests
          pnpm test
          pnpm schema:gen
          git diff --exit-code packages/schema/generated
          test -z "$(git ls-files --others --exclude-standard packages/schema/generated)"
          node scripts/validate-generated-schemas.mjs
          pnpm docs:check
          node scripts/concept-gate.mjs --since-last-tag
          pnpm staged:check
          pnpm retired:check
          pnpm inv:check
          pnpm fixtures:swift:check
          pnpm sensitive:check
          pnpm knip
          node scripts/complexity-ratchet.mjs
          node scripts/model-hints-freshness.mjs --strict
          node scripts/mcp-cli-parity-check.mjs
          node scripts/fixture-freshness-check.mjs
          pnpm release:workflow:check
          pnpm format:check
          pnpm canary
          pnpm release:verify:swift
          node scripts/verify-version-parity.mjs "$VERSION"

      - name: Build signed DMG and ZIP
        env:
          CLAUDEXOR_VERSION: ${{ needs.prepare.outputs.version }}
          CLAUDEXOR_BUILD: ${{ github.run_number }}
          MAKE_DMG: "1"
          MAKE_ZIP: "1"
        run: apps/macos/scripts/build-app.sh

      - name: Verify signed and notarized artifacts
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          app="apps/macos/dist/Claudexor.app"
          dmg="apps/macos/dist/Claudexor-$VERSION.dmg"
          zip="apps/macos/dist/Claudexor-$VERSION.zip"
          for file in "$dmg" "$dmg.sha256" "$zip" "$zip.sha256"; do
            test -s "$file" || { echo "::error::Missing expected asset: $file"; exit 1; }
          done
          shasum -a 256 -c "$dmg.sha256"
          shasum -a 256 -c "$zip.sha256"
          codesign --verify --strict --verbose=2 "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=2 "$app"
          codesign --verify --verbose=2 "$dmg"
          xcrun stapler validate "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$dmg"
          zipstage="$(mktemp -d)"
          /usr/bin/ditto -x -k "$zip" "$zipstage"
          codesign --verify --strict --verbose=2 "$zipstage/Claudexor.app"
          xcrun stapler validate "$zipstage/Claudexor.app"
          spctl --assess --type execute --verbose=2 "$zipstage/Claudexor.app"
          test -x "$zipstage/Claudexor.app/Contents/Resources/node"
          test -s "$zipstage/Claudexor.app/Contents/Resources/setup-login-runner.cjs"
          test -s "$zipstage/Claudexor.app/Contents/Resources/browser-mcp-runtime/dist/browser-mcp-launcher.js"

      - name: Build engine runtime update closure
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          closure="$RUNNER_TEMP/runtime-closure"
          rm -rf "$closure"
          # Built straight from the signed+verified app bundle, so the M7 update
          # unit is byte-identical to the closure the gates above smoke-tested.
          node scripts/build-runtime-closure.mjs \
            --app-bundle apps/macos/dist/Claudexor.app \
            --version "$VERSION" \
            --out "$closure"
          tarball="$closure/claudexor-runtime-$VERSION.tar.gz"
          manifest="$closure/runtime-manifest.json"
          test -s "$tarball" || { echo "::error::runtime closure tarball missing"; exit 1; }
          test -s "$manifest" || { echo "::error::runtime manifest missing"; exit 1; }
          # The manifest must never claim a digest the shipped tarball does not
          # have — recompute and compare before the tarball leaves this runner.
          declared="$(node -e 'process.stdout.write(JSON.parse(require("node:fs").readFileSync(process.argv[1],"utf8")).sha256)' "$manifest")"
          actual="$(shasum -a 256 "$tarball" | awk '{print $1}')"
          test "$declared" = "$actual" || { echo "::error::runtime manifest sha256 does not match the tarball"; exit 1; }

      - name: Assemble checksums, SBOM and review evidence
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          assets="$RUNNER_TEMP/release-assets"
          mkdir -p "$assets"
          cp "apps/macos/dist/Claudexor-$VERSION.dmg" "$assets/"
          cp "apps/macos/dist/Claudexor-$VERSION.zip" "$assets/"
          cp "$RUNNER_TEMP/runtime-closure/claudexor-runtime-$VERSION.tar.gz" "$assets/"
          cp "$RUNNER_TEMP/runtime-closure/runtime-manifest.json" "$assets/"
          pnpm licenses list --prod --json | node scripts/generate-release-sbom.mjs \
            --app-bundle apps/macos/dist/Claudexor.app \
            > "$assets/Claudexor-$VERSION.spdx.json"
          if [ "$RELEASE_MODE_INPUT" = publish ]; then
            cp "$RUNNER_TEMP/review-attestation.json" "$assets/REVIEW_ATTESTATION.json"
          fi
          (cd "$assets" && shasum -a 256 * > SHA256SUMS)

      - name: Upload immutable candidate assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Claudexor-${{ needs.prepare.outputs.version }}-release-assets
          path: ${{ runner.temp }}/release-assets
          if-no-files-found: error
          retention-days: 14

      - name: Attest candidate assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release-assets/*

  publish-npm:
    name: Publish npm packages with provenance
    needs: [prepare, package-macos]
    if: needs.prepare.outputs.mode == 'publish'
    runs-on: macos-26
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Revalidate review authority
        run: |
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          git fetch --no-tags origin "refs/tags/$RELEASE_REF_INPUT:refs/tags/$RELEASE_REF_INPUT"
          node scripts/verify-release-input.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify packed Darwin process identity helper
        shell: bash
        run: |
          set -euo pipefail
          package_dir="$RUNNER_TEMP/core-package-smoke"
          mkdir -p "$package_dir"
          pnpm --filter @claudexor/core pack --pack-destination "$package_dir"
          tarballs=("$package_dir"/*.tgz)
          test "${#tarballs[@]}" -eq 1 && test -f "${tarballs[0]}" || {
            echo "::error::Expected exactly one core npm tarball."
            exit 1
          }
          node scripts/verify-npm-darwin-package.mjs --tarball "${tarballs[0]}"
      - name: Publish only missing, byte-identical packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-npm-release.mjs --provenance
      - run: npm audit signatures

  npm-smoke:
    name: npm smoke on Node ${{ matrix.node-version }}
    needs: [prepare, publish-npm]
    if: needs.prepare.outputs.mode == 'publish'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.19.0, 24.16.0]
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
      - name: Clean install and CLI smoke
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          root="$(mktemp -d)"
          cd "$root"
          npm init -y >/dev/null
          npm install --ignore-scripts "claudexor@$VERSION"
          test "$(./node_modules/.bin/claudexor --version)" = "$VERSION"
          ./node_modules/.bin/claudexor help --json > help.json
          node -e 'const x=require("./help.json"); if(!x.ok||!Array.isArray(x.commands)) process.exit(1)'
          ./node_modules/.bin/claudexor doctor --json > doctor.json
          node -e 'const x=require("./doctor.json"); if(!Array.isArray(x.harnesses)) process.exit(1)'

  publish-release:
    name: Publish immutable GitHub Release
    needs: [prepare, package-macos, publish-npm, npm-smoke]
    if: needs.prepare.outputs.mode == 'publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: Claudexor-${{ needs.prepare.outputs.version }}-release-assets
          path: release-assets
      - name: Revalidate downloaded release authority and digests
        env:
          REVIEW_ATTESTATION_PATH: ${{ runner.temp }}/expected-review-attestation.json
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          git fetch --no-tags origin "refs/tags/$RELEASE_REF_INPUT:refs/tags/$RELEASE_REF_INPUT"
          node scripts/verify-release-input.mjs
          cmp "$RUNNER_TEMP/expected-review-attestation.json" release-assets/REVIEW_ATTESTATION.json
          (cd release-assets && shasum -a 256 -c SHA256SUMS)
      - name: Verify GitHub provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for file in release-assets/*; do
            gh attestation verify "$file" --repo "$GITHUB_REPOSITORY"
          done
      - name: Create draft, reject asset collisions, then publish last
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          notes="$RUNNER_TEMP/release-notes.md"
          node - "$VERSION" > "$notes" <<'NODE'
          const { readFileSync } = require("node:fs");
          const version = process.argv[2];
          const log = readFileSync("CHANGELOG.md", "utf8");
          const escaped = version.replace(/\./g, "\\.");
          const re = new RegExp(String.raw`^- \*\*v${escaped}\*\*([\s\S]*?)(?=^- \*\*v[0-9]+\.[0-9]+\.[0-9]+\*\*|$(?![\s\S]))`, "m");
          const match = re.exec(log);
          if (!match) throw new Error(`CHANGELOG.md has no entry for ${version}`);
          process.stdout.write(`Claudexor ${version}\n\n${match[1].trim()}\n\nSigned, notarized, stapled, SBOM-backed and provenance-attested.\n`);
          NODE
          if gh release view "$TAG" >/dev/null 2>&1; then
            test "$(gh release view "$TAG" --json isDraft --jq .isDraft)" = true || {
              echo "::error::Published release already exists; immutable releases are never edited."
              exit 1
            }
          else
            gh release create "$TAG" --verify-tag --draft --title "Claudexor $VERSION" --notes-file "$notes"
          fi
          remote_names="$RUNNER_TEMP/remote-assets-before.txt"
          gh release view "$TAG" --json assets --jq '.assets[].name' > "$remote_names"
          node scripts/verify-release-assets.mjs \
            --phase before --expected-dir release-assets --remote-manifest "$remote_names"
          gh release edit "$TAG" --title "Claudexor $VERSION" --notes-file "$notes" --draft
          for file in release-assets/*; do
            name="$(basename "$file")"
            if grep -Fxq "$name" "$remote_names"; then
              check="$RUNNER_TEMP/collision-$name"
              mkdir -p "$check"
              gh release download "$TAG" --pattern "$name" --dir "$check"
              cmp "$file" "$check/$name" || {
                echo "::error::Release asset collision for $name"
                exit 1
              }
            else
              gh release upload "$TAG" "$file"
            fi
          done
          remote_names_after="$RUNNER_TEMP/remote-assets-after.txt"
          gh release view "$TAG" --json assets --jq '.assets[].name' > "$remote_names_after"
          node scripts/verify-release-assets.mjs \
            --phase after --expected-dir release-assets --remote-manifest "$remote_names_after"
          gh release edit "$TAG" --draft=false --latest
