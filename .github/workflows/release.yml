name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to package, for example v0.7.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  package-macos:
    name: Package unsigned macOS app
    runs-on: macos-26
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      # Secret scan runs FIRST — before any toolchain/lifecycle step can read
      # or echo repository contents. The patterns cannot self-match their own
      # literals (each embeds a `[` that breaks the class), so workflow files
      # are scanned too; verified empirically.
      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          # Keep this pattern IDENTICAL to ci.yml's secret scan (one canonical regex).
          if git grep -InE '(\bsk-[A-Za-z0-9_-]{20,}|\bsk-ant-[A-Za-z0-9_-]{20,}|\bsk-or-[A-Za-z0-9_-]{20,}|\bghp_[A-Za-z0-9_]{20,}|\bgithub_pat_[A-Za-z0-9_]{20,}|xox[baeprs]-[A-Za-z0-9-]{10,}|\bnpm_[A-Za-z0-9]{30,}|-----BEGIN [A-Z ]*PRIVATE KEY-----)' -- . ':!pnpm-lock.yaml'; then
            echo "::error::Potential token-like secret found in tracked files."
            exit 1
          fi

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([.-][A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Release workflow requires a semver-ish v* tag, got '$tag'"
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag '$tag' is not present in this checkout."
            exit 1
          fi
          version="${tag#v}"
          build="$(git rev-list --count "${tag}^{commit}")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "CLAUDEXOR_VERSION=$version" >> "$GITHUB_ENV"
          echo "CLAUDEXOR_BUILD=$build" >> "$GITHUB_ENV"

      # Version parity is enforced UNCONDITIONALLY before any release asset
      # exists — not inside the (skippable) npm publish job. A drifted
      # manifest fails the whole release run here. One shared checker script
      # covers the root SSOT manifest + every public workspace manifest.
      - name: Verify tag version matches manifests
        run: node scripts/verify-version-parity.mjs "${{ steps.release.outputs.version }}"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Single pinning site: .node-version (three hardcoded copies drifted before).
          node-version-file: .node-version
          cache: pnpm

      - name: Capture Node binary path
        shell: bash
        run: |
          set -euo pipefail
          echo "CLAUDEXOR_NODE_BIN=$(node -p 'process.execPath')" >> "$GITHUB_ENV"

      # Signing is DATA-DRIVEN: when the four Apple secrets exist the app is
      # signed (Developer ID + hardened runtime), notarized, and stapled; a
      # fork/no-secrets run builds the honest -unsigned artifacts instead of
      # failing. SIGN_IDENTITY/NOTARY_PROFILE are the build-app.sh hooks.
      - name: Import Developer ID certificate + notary credentials
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${BUILD_CERTIFICATE_BASE64}" ]; then
            echo "No signing certificate secret; building unsigned artifacts."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          identity="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$identity" ]; then
            echo "::error::Certificate imported but no Developer ID Application identity found."
            exit 1
          fi
          echo "SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          if [ -n "${APPLE_ID}" ] && [ -n "${APPLE_TEAM_ID}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ]; then
            xcrun notarytool store-credentials "claudexor-notary" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --keychain "$KEYCHAIN_PATH" >/dev/null
            echo "NOTARY_PROFILE=claudexor-notary" >> "$GITHUB_ENV"
            echo "NOTARY_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
            echo "Signing + notarization armed."
          else
            echo "Certificate present but notary credentials incomplete; will sign without notarizing."
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify generated schemas
        shell: bash
        run: |
          set -euo pipefail
          pnpm schema:gen
          git diff --exit-code packages/schema/generated || {
            echo "::error::Generated JSON Schema is stale; run pnpm schema:gen and commit the result."
            exit 1
          }
          if [ -n "$(git ls-files --others --exclude-standard packages/schema/generated)" ]; then
            echo "::error::Untracked generated schema files exist; commit them."
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck && pnpm typecheck:tests

      - name: Test
        run: pnpm test

      - name: Docs truth (endpoints, mode ids, CLI flags)
        run: node scripts/docs-truth-check.mjs

      - name: Concept gate (cumulative since the previous release tag)
        run: node scripts/concept-gate.mjs --since-last-tag

      - name: Staged-field gate
        run: pnpm staged:check

      - name: Dead exports (knip)
        run: pnpm knip

      - name: Validate generated JSON Schema dialect (ajv)
        run: node scripts/validate-generated-schemas.mjs

      - name: Complexity ratchet
        run: node scripts/complexity-ratchet.mjs

      - name: Model-hints freshness (manifest known_models vs installed CLIs)
        # Release escalates drift warnings to failures; CI runners without the
        # vendor CLIs report "not discoverable" and pass either way.
        run: node scripts/model-hints-freshness.mjs --strict

      - name: MCP-CLI capability parity
        run: node scripts/mcp-cli-parity-check.mjs

      - name: Fixture provenance (structure; freshness needs local CLIs)
        # The GitHub runner has no vendor CLIs, and a missing CLI with
        # recorded fixtures is strict-FATAL by design — the STRICT run
        # happens in the operator's `pnpm release:verify` (checklist),
        # where the CLIs exist and re-recording is possible.
        run: node scripts/fixture-freshness-check.mjs

      - name: Canary golden stories
        run: pnpm canary

      - name: Swift tests and debug build
        run: pnpm release:verify:swift

      - name: Build DMG and ZIP
        shell: bash
        env:
          MAKE_DMG: "1"
          MAKE_ZIP: "1"
        run: |
          set -euo pipefail
          apps/macos/scripts/build-app.sh
          ls -lah apps/macos/dist
          # Asset suffix mirrors build-app.sh naming: "" (signed+notarized),
          # -signed-unnotarized, or -unsigned. Exported for the later steps.
          if [ -n "${SIGN_IDENTITY:-}" ] && [ -n "${NOTARY_PROFILE:-}" ]; then
            echo "ASSET_SUFFIX=" >> "$GITHUB_ENV"
            echo "SIGNING_LINE=The macOS app is Developer ID-signed, notarized, and stapled; macOS 26 or newer is required." >> "$GITHUB_ENV"
          elif [ -n "${SIGN_IDENTITY:-}" ]; then
            echo "ASSET_SUFFIX=-signed-unnotarized" >> "$GITHUB_ENV"
            echo "SIGNING_LINE=The macOS app is Developer ID-signed but NOT notarized; macOS 26 or newer is required." >> "$GITHUB_ENV"
          else
            echo "ASSET_SUFFIX=-unsigned" >> "$GITHUB_ENV"
            echo "SIGNING_LINE=The macOS app, DMG, and ZIP are unsigned and not notarized; macOS 26 or newer is required." >> "$GITHUB_ENV"
          fi

      - name: Verify expected assets
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          for file in \
            "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.dmg" \
            "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.dmg.sha256" \
            "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.zip" \
            "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.zip.sha256"
          do
            test -s "$file" || { echo "::error::Missing expected asset: $file"; exit 1; }
          done
          shasum -a 256 -c "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.dmg.sha256"
          shasum -a 256 -c "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.zip.sha256"
          test -f "apps/macos/dist/Claudexor.app/Contents/Resources/ClaudexorApp_ClaudexorApp.bundle/AppIcon.png" || {
            echo "::error::Packaged app is missing the SwiftPM resource bundle."
            exit 1
          }
          verify_setup_runner() {
            app="$1"
            node="$app/Contents/Resources/node"
            runner="$app/Contents/Resources/setup-login-runner.cjs"
            test -x "$node" || { echo "::error::Packaged app is missing executable bundled Node: $node"; exit 1; }
            test -s "$runner" || { echo "::error::Packaged app is missing setup-login-runner.cjs: $runner"; exit 1; }
            output="$(mktemp)"
            set +e
            "$node" "$runner" >"$output" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 2 ] || ! grep -q "usage: setup-login-runner" "$output"; then
              echo "::error::Packaged setup-login runner does not execute under bundled Node: $runner"
              cat "$output"
              rm -f "$output"
              exit 1
            fi
            rm -f "$output"
          }
          verify_setup_runner "apps/macos/dist/Claudexor.app"
          zipstage="$(mktemp -d)"
          /usr/bin/ditto -x -k "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.zip" "$zipstage"
          test -f "$zipstage/Claudexor.app/Contents/Resources/ClaudexorApp_ClaudexorApp.bundle/AppIcon.png" || {
            echo "::error::Release ZIP app is missing the SwiftPM resource bundle."
            exit 1
          }
          verify_setup_runner "$zipstage/Claudexor.app"
          # Signed builds: Gatekeeper must actually accept the stapled app.
          if [ -z "${ASSET_SUFFIX}" ]; then
            spctl --assess --type execute --verbose=2 "$zipstage/Claudexor.app"
          fi

      - name: Upload workflow artifact
        # Redundant CI-scratch copy: the canonical deliverable is the GitHub
        # Release assets (next step, uploaded via gh release with GITHUB_TOKEN).
        # Actions artifact storage can be quota-capped; that must NEVER block the
        # actual Release publish (Release assets use separate storage).
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Claudexor-${{ steps.release.outputs.version }}-macos
          path: |
            apps/macos/dist/Claudexor-${{ steps.release.outputs.version }}*.dmg
            apps/macos/dist/Claudexor-${{ steps.release.outputs.version }}*.dmg.sha256
            apps/macos/dist/Claudexor-${{ steps.release.outputs.version }}*.zip
            apps/macos/dist/Claudexor-${{ steps.release.outputs.version }}*.zip.sha256
          if-no-files-found: error

      - name: Create or update draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          notes="$(mktemp)"
          # Notes come FROM the CHANGELOG entry (single source of shipped-
          # behavior truth); the operator finalizes before publishing.
          node - "$version" > "$notes" <<'NODE'
          const { readFileSync } = require("node:fs");
          const version = process.argv[2];
          const log = readFileSync("CHANGELOG.md", "utf8");
          // CHANGELOG entries are BULLETS: `- **vX.Y.Z** (date) — text...`
          // (continuation lines indented); an entry ends at the next version
          // bullet or EOF.
          const re = new RegExp(String.raw`^- \*\*v${version.replace(/\./g, "\\.")}\*\*([\s\S]*?)(?=^- \*\*v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?\*\*|$(?![\s\S]))`, "m");
          const m = re.exec(log);
          if (!m) {
            console.error(`CHANGELOG.md has no entry for ${version}`);
            process.exit(1);
          }
          process.stdout.write(`Claudexor ${version}\n\n${m[1].trim()}\n\nBuilt by GitHub Actions from tag v${version} at commit ${process.env.GITHUB_SHA}.\n${process.env.SIGNING_LINE}\nVerify downloads with the attached SHA256 files.\n`);
          NODE
          # A re-package of an ALREADY-PUBLISHED release must not demote it
          # back to draft (the v1.0.0 near-miss): only pass --draft while the
          # release is still a draft (or on first creation).
          if gh release view "$tag" >/dev/null 2>&1; then
            if [ "$(gh release view "$tag" --json isDraft --jq .isDraft)" = "true" ]; then
              gh release edit "$tag" --title "Claudexor ${version}" --notes-file "$notes" --draft
            else
              gh release edit "$tag" --title "Claudexor ${version}" --notes-file "$notes"
            fi
          else
            gh release create "$tag" --title "Claudexor ${version}" --notes-file "$notes" --draft --verify-tag
          fi
          gh release upload "$tag" \
            "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.dmg" \
            "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.dmg.sha256" \
            "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.zip" \
            "apps/macos/dist/Claudexor-${version}${ASSET_SUFFIX}.zip.sha256" \
            --clobber

  publish-npm:
    name: Publish npm packages (provenance)
    runs-on: ubuntu-latest
    # npm publish happens only for the real tag push (not workflow_dispatch
    # repackaging), only after the macOS gate battery passed, and only once
    # the operator has armed it by setting the NPM_PUBLISH repository
    # variable to "true" (npm org + NPM_TOKEN are provisioned separately;
    # until then the job skips instead of failing the release run).
    needs: package-macos
    if: github.event_name == 'push' && vars.NPM_PUBLISH == 'true'
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Publish-time defense: the same parity bar package-macos already
      # enforced, re-checked in this job because publishing is the
      # irreversible step (npm versions cannot be reused).
      - name: Verify tag version matches manifests
        run: node scripts/verify-version-parity.mjs "${GITHUB_REF_NAME#v}"

      - name: Publish (public, provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --provenance must be the CLI flag: pnpm's native publish does not
        # honor the NPM_CONFIG_PROVENANCE env var. The flag also fails loudly
        # (instead of silently skipping attestation) if the repo is not yet
        # public or the workflow lacks id-token permissions.
        run: pnpm -r publish --access public --no-git-checks --provenance
