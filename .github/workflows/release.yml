name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to package, for example v0.7.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  package-macos:
    name: Package unsigned macOS beta
    runs-on: macos-26
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      # Secret scan runs FIRST — before any toolchain/lifecycle step can read
      # or echo repository contents. The patterns cannot self-match their own
      # literals (each embeds a `[` that breaks the class), so workflow files
      # are scanned too; verified empirically.
      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          if git grep -InE '(sk-[A-Za-z0-9_-]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|sk-or-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|xox[baeprs]-[A-Za-z0-9-]{10,}|npm_[A-Za-z0-9]{30,}|-----BEGIN [A-Z ]*PRIVATE KEY-----)' -- . ':!pnpm-lock.yaml'; then
            echo "::error::Potential token-like secret found in tracked files."
            exit 1
          fi

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([.-][A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Release workflow requires a semver-ish v* tag, got '$tag'"
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag '$tag' is not present in this checkout."
            exit 1
          fi
          version="${tag#v}"
          build="$(git rev-list --count "${tag}^{commit}")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "CLAUDEXOR_VERSION=$version" >> "$GITHUB_ENV"
          echo "CLAUDEXOR_BUILD=$build" >> "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Capture Node binary path
        shell: bash
        run: |
          set -euo pipefail
          echo "CLAUDEXOR_NODE_BIN=$(node -p 'process.execPath')" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify generated schemas
        shell: bash
        run: |
          set -euo pipefail
          pnpm schema:gen
          git diff --exit-code packages/schema/generated || {
            echo "::error::Generated JSON Schema is stale; run pnpm schema:gen and commit the result."
            exit 1
          }
          if [ -n "$(git ls-files --others --exclude-standard packages/schema/generated)" ]; then
            echo "::error::Untracked generated schema files exist; commit them."
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck && pnpm typecheck:tests

      - name: Test
        run: pnpm test

      - name: Docs truth (endpoints, mode ids, CLI flags)
        run: node scripts/docs-truth-check.mjs

      - name: Concept gate (cumulative since the previous release tag)
        run: node scripts/concept-gate.mjs --since-last-tag

      - name: Staged-field gate
        run: pnpm staged:check

      - name: Dead exports (knip)
        run: pnpm knip

      - name: Validate generated JSON Schema dialect (ajv)
        run: node scripts/validate-generated-schemas.mjs

      - name: Complexity ratchet
        run: node scripts/complexity-ratchet.mjs

      - name: Model-hints freshness (manifest known_models vs installed CLIs)
        # Release escalates drift warnings to failures; CI runners without the
        # vendor CLIs report "not discoverable" and pass either way.
        run: node scripts/model-hints-freshness.mjs --strict

      - name: MCP-CLI capability parity
        run: node scripts/mcp-cli-parity-check.mjs

      - name: Fixture provenance (structure; freshness needs local CLIs)
        # The GitHub runner has no vendor CLIs, and a missing CLI with
        # recorded fixtures is strict-FATAL by design — the STRICT run
        # happens in the operator's `pnpm release:verify` (checklist),
        # where the CLIs exist and re-recording is possible.
        run: node scripts/fixture-freshness-check.mjs

      - name: Canary golden stories
        run: pnpm canary

      - name: Swift tests and debug build
        run: pnpm release:verify:swift

      - name: Build unsigned DMG and ZIP
        shell: bash
        env:
          MAKE_DMG: "1"
          MAKE_ZIP: "1"
        run: |
          set -euo pipefail
          apps/macos/scripts/build-app.sh
          ls -lah apps/macos/dist

      - name: Verify expected assets
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          for file in \
            "apps/macos/dist/Claudexor-${version}-unsigned.dmg" \
            "apps/macos/dist/Claudexor-${version}-unsigned.dmg.sha256" \
            "apps/macos/dist/Claudexor-${version}-unsigned.zip" \
            "apps/macos/dist/Claudexor-${version}-unsigned.zip.sha256"
          do
            test -s "$file" || { echo "::error::Missing expected asset: $file"; exit 1; }
          done
          shasum -a 256 -c "apps/macos/dist/Claudexor-${version}-unsigned.dmg.sha256"
          shasum -a 256 -c "apps/macos/dist/Claudexor-${version}-unsigned.zip.sha256"
          test -f "apps/macos/dist/Claudexor.app/ClaudexorApp_ClaudexorApp.bundle/AppIcon.png" || {
            echo "::error::Packaged app is missing the SwiftPM resource bundle."
            exit 1
          }
          zipstage="$(mktemp -d)"
          /usr/bin/ditto -x -k "apps/macos/dist/Claudexor-${version}-unsigned.zip" "$zipstage"
          test -f "$zipstage/Claudexor.app/ClaudexorApp_ClaudexorApp.bundle/AppIcon.png" || {
            echo "::error::Release ZIP app is missing the SwiftPM resource bundle."
            exit 1
          }

      - name: Upload workflow artifact
        # Redundant CI-scratch copy: the canonical deliverable is the GitHub
        # Release assets (next step, uploaded via gh release with GITHUB_TOKEN).
        # Actions artifact storage can be quota-capped; that must NEVER block the
        # actual Release publish (Release assets use separate storage).
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Claudexor-${{ steps.release.outputs.version }}-unsigned-macos
          path: |
            apps/macos/dist/Claudexor-${{ steps.release.outputs.version }}-unsigned.dmg
            apps/macos/dist/Claudexor-${{ steps.release.outputs.version }}-unsigned.dmg.sha256
            apps/macos/dist/Claudexor-${{ steps.release.outputs.version }}-unsigned.zip
            apps/macos/dist/Claudexor-${{ steps.release.outputs.version }}-unsigned.zip.sha256
          if-no-files-found: error

      - name: Create or update draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          notes="$(mktemp)"
          cat > "$notes" <<EOF
          Claudexor ${version} unsigned beta build.

          Highlights:
          - macOS packaging now embeds the SwiftPM resource bundle required by
            Bundle.module, so release artifacts launch outside the build machine.
          - The release workflow verifies the packaged app and ZIP contain that
            resource bundle before uploading assets.
          - Includes the self-contained macOS app with bundled claudexord and Node.

          This release is built by GitHub Actions from tag ${tag} at commit ${GITHUB_SHA}.
          The macOS app, DMG, and ZIP are unsigned and not notarized for ${tag}.
          macOS 26 or newer is required.
          Verify downloads with the attached SHA256 files.
          EOF
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "Claudexor ${version}" --notes-file "$notes" --draft --prerelease
          else
            gh release create "$tag" --title "Claudexor ${version}" --notes-file "$notes" --draft --prerelease --verify-tag
          fi
          gh release upload "$tag" \
            "apps/macos/dist/Claudexor-${version}-unsigned.dmg" \
            "apps/macos/dist/Claudexor-${version}-unsigned.dmg.sha256" \
            "apps/macos/dist/Claudexor-${version}-unsigned.zip" \
            "apps/macos/dist/Claudexor-${version}-unsigned.zip.sha256" \
            --clobber
