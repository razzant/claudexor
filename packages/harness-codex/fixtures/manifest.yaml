# Fixture provenance manifest. Every stream fixture declares its
# source; recorded fixtures carry the vendor CLI version they were captured
# from so scripts/fixture-freshness-check.mjs can warn when the installed CLI
# has moved on (stale recordings are a freshness smell, not a build breaker).
#
# `expectations` (W3.8) are the STREAM SEMANTICS the conformance test asserts
# through core streamExpectationViolations. Codex has NO typed final marker on
# the wire: the adapter finalizes the turn's last agent_message on
# turn.completed (requires the CodexParseState the run loop passes).
cli: codex
fixtures:
  basic-run.jsonl:
    source: synthetic
    expectations:
      final_messages: 1
      final_source: "last_agent_message"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: false
  plan-progress-todo-list.jsonl:
    source: synthetic
    expectations:
      final_messages: 1
      final_source: "last_agent_message"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: false
  recorded-real-cli.jsonl:
    source: recorded
    cli_version: "0.144.1"
    recorded_at: "2026-07-13"
    expectations:
      final_messages: 1
      final_source: "last_agent_message"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: false
  session-resume-rate-limit.jsonl:
    source: synthetic
    expectations:
      final_messages: 1
      final_source: "last_agent_message"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: true
  # D-16 / codex #19816: `--output-schema` constrains INTERMEDIATE agent
  # messages too, so each mid-run narration arrives as a raw
  # `{work_report, output}` envelope (owner dogfood: the raw envelope streamed
  # into the PROGRESS bubble before the final answer). The parser unwraps the
  # envelope to its `output` (or suppresses a non-string one) for the VISIBLE
  # stream when the run armed the envelope (CodexParseState.envelopeActive);
  # the FINAL message keeps the raw envelope so the orchestrator's unwrap runs
  # unchanged. This conformance loop runs WITHOUT envelopeActive, so the raw
  # envelope messages pass through as ordinary text here — the unwrap/suppress
  # behavior is asserted in parse.test.ts. Output values are Russian to mirror
  # the live dogfood capture.
  structured-envelope-intermediate.jsonl:
    source: synthetic
    expectations:
      final_messages: 1
      final_source: "last_agent_message"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: false
  # D-16 CONTEXT-EXHAUSTION EVIDENCE (live, codex-cli 0.144.1, 2026-07-23).
  # Lives in context/ (NOT top-level) because the top-level conformance loop
  # asserts tool_call/tool_result/usage on every fixture and this capture has
  # NONE of those — it is a terminal-shape probe, not a normal run. No
  # `expectations` block: the subdir file is not consumed by the conformance
  # loop, only by the freshness/provenance gate.
  #
  # FINDING (contradicts the task's #16033 assumption): in codex 0.144.1 exec,
  # `-c model_context_window=8000 -c model_auto_compact_token_limit=0` does NOT
  # enforce a hard token ceiling — streams of 114863 / 368799 / 686009 input
  # tokens all reached turn.completed with exit 0. The ONLY hard terminal
  # reachable for us is the app-server INPUT CHAR CAP (1048576 chars): an
  # oversized single prompt fails `turn/start` with JSON-RPC code -32602 and
  # `input_error_code: input_too_large`. This is NOT a token ContextWindow
  # Exceeded and it is emitted OUT-OF-BAND on stderr — the `--json` stdout
  # stream carries ONLY `thread.started` (see the .jsonl) and then the process
  # exits 1. The verbatim stderr terminal line is captured in the sibling
  # `exec-oversized-input.stderr.txt`. Implication for D-16: codex 0.144.1 exec
  # exposes NO typed context-exhaustion STREAM frame to map; a mapper must key
  # off exit code + the stderr JSON-RPC error, and `input_too_large` (a char
  # cap) is a distinct class from token-window exhaustion.
  # thread_id neutralized to a placeholder (not sensitive; sanitized for
  # determinism, matching the claude fixtures' id policy).
  context/exec-oversized-input.jsonl:
    source: recorded
    cli_version: "0.144.1"
    recorded_at: "2026-07-23"
    sanitized: "thread_id"
    terminal_out_of_band: "stderr (see exec-oversized-input.stderr.txt): turn/start failed, JSON-RPC code -32602, input_error_code=input_too_large, max_chars=1048576"
