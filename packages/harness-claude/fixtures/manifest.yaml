# Fixture provenance manifest. Every stream fixture declares its source;
# recorded fixtures carry the vendor CLI version they were captured from so
# scripts/fixture-freshness-check.mjs can warn when the installed CLI has
# moved on (stale recordings are a freshness smell, not a build breaker).
# Recorded fixtures are SANITIZED: request/message ids, thinking signatures,
# and the recording machine's environment fingerprint (installed skills /
# slash commands / memory paths) are replaced with neutral placeholders;
# frame shapes and event ordering are untouched.
#
# `expectations` (W3.8) are the STREAM SEMANTICS the conformance test asserts
# through core streamExpectationViolations — exact counts on a deterministic
# fixture pin the finality/dedup/delta/lifecycle regression classes.
# `final_source` is the MACHINE-checked identity of the wire event finality
# came from (the adapter stamps payload.final_source on final messages).
cli: claude
fixtures:
  basic-run.jsonl:
    source: synthetic
    expectations:
      final_messages: 1
      final_source: "result"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: false
  plan-progress-task-tools.jsonl:
    source: synthetic
    expectations:
      # The result frame carries usage but NO result text — an absent final
      # is the honest outcome, never invented from narration.
      final_messages: 0
      # No final here (the result frame carries no text): source unasserted.
      final_is_last_message: false
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: false
  stream-deltas.jsonl:
    source: synthetic
    expectations:
      # 3 main-conversation text deltas surface flagged; the subagent delta
      # (parent_tool_use_id) and message_start plumbing never surface.
      final_messages: 1
      final_source: "result"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 3
      typed_rate_limit: false
  recorded-real-cli.jsonl:
    source: recorded
    cli_version: "2.1.165"
    recorded_at: "2026-06-10"
    sanitized: "ids, signatures, environment fingerprint"
    expectations:
      final_messages: 1
      final_source: "result"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: false
  session-resume-rate-limit.jsonl:
    source: synthetic
    expectations:
      final_messages: 1
      final_source: "result"
      final_is_last_message: true
      # The vendor sends PROSE ("rate_limit_error: Number of request tokens
      # has exceeded..."). Since F5 the mapper classifies that prose onto the
      # documented categories (bare labels still accepted; unrecognized still
      # collapses to "unknown") — this declaration moved "unknown" →
      # "rate_limit" deliberately with that change.
      retry_class: "rate_limit"
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: true
  protocol/control-handshake.jsonl:
    source: recorded
    cli_version: "2.1.165"
    recorded_at: "2026-06-10"
    sanitized: "ids, signatures, environment fingerprint"
    expectations:
      # An AskUserQuestion round trip over the control protocol. What this pins:
      # the control frames themselves (control_response / control_cancel_request)
      # are recognized plumbing and leak NOTHING into the timeline — the only
      # events are the session's own (started, the AskUserQuestion tool pair,
      # the answer, usage, and the terminal result). The empty `thinking` block
      # in the assistant frame stays excluded.
      final_messages: 1
      final_source: "result"
      final_is_last_message: true
      thinking_events: 0
      delta_messages: 0
      typed_rate_limit: false
  # D-16 TYPED-SIGNAL EVIDENCE (claude 2.1.165). These live in signals/ (NOT
  # top-level) on purpose: the top-level conformance loop asserts
  # tool_call/tool_result/error/usage on every fixture, and these captures are
  # single-turn signal probes with no tools. They carry no `expectations`
  # block (not consumed by the loop, only by the freshness/provenance gate).
  # Sanitized like the other recorded fixtures: ids, signatures, and the
  # environment fingerprint (skills / slash commands / plugins / memory paths /
  # cwd) are neutral placeholders; the SIGNAL-bearing fields
  # (rate_limit_info, terminal_reason, api_error_status, usage) are UNTOUCHED.
  #
  # LIVE. A trivial no-tool `-p --output-format stream-json --verbose` run on
  # the subscription route (apiKeySource none). Proves three D-16 promises at
  # once on this CLI version:
  #  - result frame carries terminal_reason:"completed" AND full usage/
  #    modelUsage (B2 answered: 2.1.165 DOES emit terminal_reason);
  #  - a top-level typed rate_limit_event frame really appears on a normal run
  #    (QA-015): shape
  #    {type:"rate_limit_event", rate_limit_info:{status, resetsAt,
  #     rateLimitType, overageStatus, overageDisabledReason, isUsingOverage},
  #     uuid, session_id} — captured with status:"allowed" (so QA-015's
  #    frame is now a LIVE recording, no longer synthetic);
  #  - a 2.1.165-new system/post_turn_summary frame (status_category /
  #    status_detail / needs_action) that no prior fixture carried.
  signals/terminal-completed-rate-limit-event.jsonl:
    source: recorded
    cli_version: "2.1.165"
    recorded_at: "2026-07-23"
    sanitized: "ids, environment fingerprint"
  # LIVE. Oversized single prompt (~504274 tokens) to a 200000-window model.
  # The terminal shape D-16 maps for Claude context exhaustion:
  #   result frame: subtype:"success", is_error:true, api_error_status:400,
  #   stop_reason:"stop_sequence", terminal_reason:"prompt_too_long",
  #   result:"Prompt is too long · the request is ~504274 tokens (limit
  #   200000) …", total_cost_usd:0, empty modelUsage.
  # The preceding assistant frame carries model:"<synthetic>",
  # error:"invalid_request" and the same prose. No prompt bytes are echoed.
  signals/terminal-prompt-too-long.jsonl:
    source: recorded
    cli_version: "2.1.165"
    recorded_at: "2026-07-23"
    sanitized: "ids, environment fingerprint"
  # SYNTHETIC — to be replaced at the next paid smoke that trips a real
  # auto-compaction. A cheap live compact_boundary was not reachable (a
  # single-exchange -p run cannot be compacted; stuffing context to the
  # auto-compact threshold is the expensive path D-16 explicitly avoids).
  # Shape follows the official Agent SDK contract:
  #   {type:"system", subtype:"compact_boundary",
  #    compact_metadata:{trigger:"auto"|"manual", pre_tokens:<int>}, uuid,
  #    session_id}. Marked synthetic per docs/CHECKLISTS.md fixture rule.
  signals/compact-boundary.jsonl:
    source: synthetic
