# Fixture provenance manifest (Tier7 #49). Every stream fixture declares its
# source; recorded fixtures carry the vendor CLI version they were captured
# from so scripts/fixture-freshness-check.mjs can warn when the installed CLI
# has moved on (stale recordings are a freshness smell, not a build breaker).
cli: claude
fixtures:
  basic-run.jsonl:
    source: synthetic
  plan-progress-task-tools.jsonl:
    source: synthetic
  recorded-real-cli.jsonl:
    source: recorded
    cli_version: "2.1.165"
    recorded_at: "2026-06-10"
  session-resume-rate-limit.jsonl:
    source: synthetic
  protocol/control-handshake.jsonl:
    source: synthetic
